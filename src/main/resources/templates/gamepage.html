<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBacklog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <header>
        <h1><a th:href="@{/}">GameBacklog</a></h1>
        <p>Organize os jogos que você já jogou ou pretende jogar</p>
    </header>

    <nav>
        <ul>
            <li><a th:href="@{/gamelist}">Lista de jogos</a></li>
            <li><a th:href="@{/add}">Adicionar jogo</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2 th:text="${gameName}"></h2>
            <dl>
                <dt>Id</dt>
                <dd th:text="${gameId}"></dd>
                <dt>Plataforma</dt>
                <dd th:text="${gamePlatform}"></dd>
                <dt>Status</dt>
                <dd th:text="${gameStatus}"></dd>
                <dt>Avaliação</dt>
                <dd th:text="${gameRating}"></dd>
            </dl>
        </section>
    </main>
    <footer><p>Gabriel Nascimento Souza - SI5</p></footer>

</body>
</html>
