<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBacklog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <header>
        <h1><a th:href="@{/}">GameBacklog</a></h1>
        <p>Organize os jogos que você já jogou ou pretende jogar</p>
    </header>

    <main>
        <h2>Login</h2>

        <form class="main-form" method="post" th:action="@{/login}">
            
            <label>Usuário</label>
            <input type="text" name="username" required>

            <label>Senha</label>
            <input type="password" name="password" required>

            <button type="submit">Entrar</button>

        </form>
        <p>Ainda não tem uma conta? <a href="/user/register">Cadastre-se</a></p>     
    </main>
    <footer><p>Gabriel Nascimento Souza - SI5</p></footer>

</body>
</html>
