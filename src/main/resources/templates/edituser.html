<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBacklog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <header>
        <h1>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}">
                GameBacklog
            </a>

            <a sec:authorize="hasRole('USER')" th:href="@{/dashboard}">
                GameBacklog
            </a>

            <a sec:authorize="!isAuthenticated()" th:href="@{/}">
                GameBacklog
            </a>
        </h1>
        <p>Organize os jogos que você já jogou ou pretende jogar</p>
    </header>

    <nav>
        <ul class="nav-list">
            <li sec:authorize="isAuthenticated() and hasRole('USER')">
                <a href="/gamelist">Meus jogos</a>
            </li>

            <li sec:authorize="isAuthenticated() and hasRole('USER')">
                <a href="/addgame">Adicionar jogo</a>
            </li>

            <li sec:authorize="isAuthenticated() and hasRole('ADMIN')">
                <a href="/user/list">Usuários</a>
            </li>

            <li sec:authorize="isAuthenticated() and hasRole('ADMIN')">
                <a href="/game/list-all">Todos os jogos</a>
            </li>

            <li class="user-info" sec:authorize="isAuthenticated()">
                Olá, <strong sec:authentication="name"></strong>
            </li>

            <li sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post">
                    <button class="logout-button">Sair</button>
                </form>
            </li>

            <li sec:authorize="!isAuthenticated()">
                <a href="/login">Login</a>
            </li>

            <li sec:authorize="!isAuthenticated()">
                <a href="/user/register">Criar conta</a>
            </li>
        </ul>
    </nav>

    <main>
        <h2>Editar usuário</h2>

        <form class="main-form"
            th:action="@{/user/{id}/edit(id=${user.id})}"
            method="post"
            th:object="${user}">

            <fieldset>
                <legend>Editar usuário</legend>

                <label for="username">Nome de usuário:</label>
                <input type="text"
                    th:field="*{username}"
                    id="username"
                    maxlength="50"
                    required>

                <label for="password">Senha:</label>
                <input type="password"
                    th:field="*{password}"
                    id="password"
                    maxlength="100"
                    required>

                <label for="role">Perfil:</label>
                <select th:field="*{role}"
                        id="role"
                        required>

                    <option value="ROLE_USER">Usuário</option>
                    <option value="ROLE_ADMIN">Administrador</option>

                </select>

                <button type="submit">
                    Salvar
                </button>

            </fieldset>

        </form>        
    </main>
    <footer><p>Gabriel Nascimento Souza - SI5</p></footer>

</body>
</html>
