<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameBacklog</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <header>
        <h1><a th:href="@{/}">GameBacklog</a></h1>
        <p>Organize os jogos que você já jogou ou pretende jogar</p>
    </header>

    <main>
        <h2>Cadastrar usuário</h2>

        <form class="main-form"
            th:action="@{/user/register}"
            method="post"
            th:object="${user}">

            <fieldset>
                <legend>Cadastro de usuário</legend>

                <label for="username">Nome de usuário:</label>
                <input type="text"
                    th:field="*{username}"
                    id="username"
                    maxlength="50"
                    required>

                <label for="password">Senha:</label>
                <input type="password"
                    th:field="*{password}"
                    id="password"
                    maxlength="100"
                    required>

                <button type="submit">
                    Cadastrar
                </button>

            </fieldset>

        </form>        
    </main>
    <footer><p>Gabriel Nascimento Souza - SI5</p></footer>

</body>
</html>
